<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @font-face {
        font-family: 'Oxanium';
        font-style: normal;
        font-weight: 300;
        src: url('https://raw.githubusercontent.com/coreelian/ashveil-assets/main/oxanium-v21-latin-300.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Oxanium';
        font-style: normal;
        font-weight: 700;
        src: url('https://raw.githubusercontent.com/coreelian/ashveil-assets/main/oxanium-v21-latin-700.woff2') format('woff2');
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="120" fill="#07090d"/>

  <!-- Outer dashed ring -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="#1a2030" stroke-width="0.8" stroke-dasharray="3 4"/>
  <!-- Main ring -->
  <circle cx="60" cy="60" r="28" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
  <!-- Center node -->
  <circle cx="60" cy="60" r="8" fill="#00f0ff"/>

  <!-- Right arm -->
  <line x1="88" y1="60" x2="104" y2="60" stroke="#00f0ff" stroke-width="1"/>
  <line x1="104" y1="60" x2="104" y2="40" stroke="#00f0ff" stroke-width="1"/>
  <circle cx="104" cy="40" r="4" fill="#ff0033"/>

  <!-- Left arm -->
  <line x1="32" y1="60" x2="16" y2="60" stroke="#00f0ff" stroke-width="1"/>
  <line x1="16" y1="60" x2="16" y2="80" stroke="#00f0ff" stroke-width="1"/>
  <circle cx="16" cy="80" r="4" fill="#cc00ff"/>

  <!-- Top arm -->
  <line x1="60" y1="32" x2="60" y2="14" stroke="#00f0ff" stroke-width="1"/>
  <rect x="50" y="6" width="20" height="9" fill="none" stroke="#ff0033" stroke-width="1"/>

  <!-- Bottom arm -->
  <line x1="60" y1="88" x2="60" y2="106" stroke="#00f0ff" stroke-width="1"/>
  <rect x="50" y="106" width="20" height="9" fill="none" stroke="#cc00ff" stroke-width="1"/>

  <!-- Wordmark ASH cyan -->
  <text x="140" y="74" font-family="Oxanium, sans-serif" font-size="52" font-weight="700" fill="#00f0ff" letter-spacing="3">ASH</text>
  <!-- Wordmark VEIL white -->
  <text x="284" y="74" font-family="Oxanium, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="3">VEIL</text>

  <!-- Divider lines -->
  <line x1="140" y1="83" x2="500" y2="83" stroke="#1a2030" stroke-width="0.5"/>
  <line x1="140" y1="83" x2="240" y2="83" stroke="#ff0033" stroke-width="0.8"/>

  <!-- Subtitle -->
  <text x="140" y="100" font-family="Oxanium, sans-serif" font-size="11" font-weight="300" fill="#00f0ff" letter-spacing="6">INFRASTRUCTURE</text>
  <text x="370" y="100" font-family="Oxanium, sans-serif" font-size="11" font-weight="300" fill="#4a5568" letter-spacing="3">ashveil.dev</text>
</svg>
